<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ Arcane Sandbox - 22 Spells Edition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #04040a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      user-select: none
    }

    #wrap {
      position: relative
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #1a1a3a;
      box-shadow: 0 0 80px rgba(60, 30, 160, .3), 0 0 200px rgba(40, 20, 100, .15)
    }

    #toolbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 3px;
      padding: 4px 6px;
      background: rgba(4, 4, 12, .94);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid rgba(60, 40, 120, .4);
      z-index: 10;
      flex-wrap: wrap;
      align-items: center
    }

    .tb-section {
      display: flex;
      gap: 2px;
      align-items: center;
      padding: 0 4px;
      border-right: 1px solid rgba(60, 40, 120, .3)
    }

    .tb-section:last-child {
      border: none
    }

    .tb-label {
      font-size: 5px;
      color: #555;
      margin-right: 2px;
      white-space: nowrap
    }

    .tb-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      padding: 3px 5px;
      background: rgba(20, 18, 40, .8);
      color: #999;
      border: 1px solid rgba(60, 50, 100, .4);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      border-radius: 2px
    }

    .tb-btn:hover {
      background: rgba(40, 30, 80, .8);
      color: #ddd;
      border-color: rgba(100, 70, 200, .5);
      box-shadow: 0 0 8px rgba(80, 50, 180, .3)
    }

    .tb-btn.active {
      background: rgba(60, 30, 120, .7);
      color: #fff;
      border-color: rgba(120, 80, 220, .6);
      box-shadow: 0 0 14px rgba(100, 60, 200, .5)
    }

    .spell-btn {
      font-size: 9px;
      padding: 2px 4px;
      min-width: 24px;
      text-align: center;
      position: relative
    }

    .spell-btn .key-hint {
      position: absolute;
      top: -1px;
      right: -1px;
      font-size: 4px;
      color: #666;
      background: rgba(0, 0, 0, .6);
      padding: 0 2px;
      border-radius: 1px;
      line-height: 1.4
    }

    .spell-row {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      max-width: 420px
    }

    #hud {
      position: absolute;
      bottom: 6px;
      left: 8px;
      display: flex;
      gap: 10px;
      z-index: 10;
      pointer-events: none
    }

    .hud-bar {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .hud-bar label {
      font-size: 5px;
      color: #777
    }

    .bar-bg {
      width: 85px;
      height: 7px;
      background: rgba(0, 0, 0, .6);
      border: 1px solid rgba(80, 60, 120, .3);
      border-radius: 1px;
      overflow: hidden
    }

    .bar-fg {
      height: 100%;
      transition: width .1s
    }

    .hp-fg {
      background: linear-gradient(90deg, #991122, #dd3344);
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, .3)
    }

    .mp-fg {
      background: linear-gradient(90deg, #112299, #3344dd);
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, .3)
    }

    #info {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 5px;
      color: #444;
      z-index: 10;
      pointer-events: none;
      text-align: right;
      line-height: 1.6
    }

    #spellInfo {
      position: absolute;
      bottom: 20px;
      left: 8px;
      font-size: 5px;
      color: #888;
      z-index: 10;
      pointer-events: none
    }

    #gravLabel {
      font-size: 5px;
      color: #666;
      margin: 0 2px
    }

    .cd-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, .6);
      pointer-events: none;
      transition: height 50ms
    }
  </style>
</head>

    const SoundFX = {
      ctx: null, master: null, initialized: false,
      init() {
        if (this.initialized) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.5; // Master volume
        this.master.connect(this.ctx.destination);
        this.initialized = true;
      },
      _play(t, k) { if (!this.initialized) this.init(); if (this.ctx.state === 'suspended') this.ctx.resume(); try { k(); } catch (e) { } },
      playTone(freq, type, dur, vol, slideFreq) {
        this._play(dur, () => {
          const o = this.ctx.createOscillator(), g = this.ctx.createGain();
          o.type = type; o.frequency.setValueAtTime(freq, this.ctx.currentTime);
          if (slideFreq) o.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + dur);
          g.gain.setValueAtTime(0, this.ctx.currentTime);
          g.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + dur * 0.1);
          g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
          o.connect(g); g.connect(this.master); o.start(); o.stop(this.ctx.currentTime + dur);
        });
      },
      playNoise(dur, vol, filterFreq, type = 'lowpass', Q = 1) {
        this._play(dur, () => {
          const bs = this.ctx.createBufferSource(), b = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate), cd = b.getChannelData(0);
          for (let i = 0; i < cd.length; i++) cd[i] = Math.random() * 2 - 1; bs.buffer = b;
          const f = this.ctx.createBiquadFilter(), g = this.ctx.createGain();
          f.type = type; f.frequency.value = filterFreq; f.Q.value = Q;
          g.gain.setValueAtTime(vol, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
          bs.connect(f); f.connect(g); g.connect(this.master); bs.start(); bs.stop(this.ctx.currentTime + dur);
        });
      },
      playSweep(f1, f2, type, dur, vol) {
        this._play(dur, () => {
          const o = this.ctx.createOscillator(), g = this.ctx.createGain();
          o.type = type; o.frequency.setValueAtTime(f1, this.ctx.currentTime);
          o.frequency.exponentialRampToValueAtTime(f2, this.ctx.currentTime + dur);
          g.gain.setValueAtTime(vol, this.ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
          o.connect(g); g.connect(this.master); o.start(); o.stop(this.ctx.currentTime + dur);
        });
      }

        // Draw spike columns
        for (let sx2 = bx; sx2 < bx + sk.w; sx2 += 8) {
          const sh = sk.h * (1 - Math.abs(sx2 - bx - sk.w / 2) / (sk.w / 2) * .4);
          X.fillStyle = sk.color; X.fillRect(sx2, by - sh, 6, sh);
          X.fillStyle = sk.c2; X.fillRect(sx2, by - sh, 2, sh * .6);
          X.fillStyle = darken(sk.color, .3); X.fillRect(sx2 + 4, by - sh + 2, 2, sh - 2);
          // Tip
          X.fillStyle = sk.c2; X.beginPath(); X.moveTo(sx2, by - sh); X.lineTo(sx2 + 3, by - sh - 6); X.lineTo(sx2 + 6, by - sh); X.fill();
        }
        X.globalAlpha = 1;
      }
      // timebombs handled by vfxEngine
    }

    function drawParticles() {
      for (const p of particles) {
        const a = Math.max(0, p.life / p.ml); X.globalAlpha = a; X.fillStyle = p.color; const s2 = p.size * Math.min(1, a + .3);
        if (p.type === 'debris') { X.save(); X.translate(p.x, p.y); X.rotate(p.rot || 0); X.fillRect(-s2 / 2, -s2 / 2, s2, s2); X.restore(); }
        else X.fillRect(p.x - s2 / 2 | 0, p.y - s2 / 2 | 0, Math.ceil(s2), Math.ceil(s2));
      } X.globalAlpha = 1;
    }

    function drawDmgNumbers() {
      for (const d of damageNumbers) {
        const a = Math.max(0, d.life / 70), sz = Math.min(9, 6 + (d.sc || 1));
        X.font = `${sz}px "Press Start 2P"`; X.globalAlpha = a; X.fillStyle = '#000'; X.fillText((d.color === '#44ff44' ? '+' : '-') + d.val, d.x + 1, d.y + 1);
        X.fillStyle = d.color; X.fillText((d.color === '#44ff44' ? '+' : '-') + d.val, d.x, d.y);
      } X.globalAlpha = 1;
    }

    function drawLighting() {
      LX.clearRect(0, 0, W, H); LX.fillStyle = 'rgba(0,0,10,0.35)'; LX.fillRect(0, 0, W, H);
      LX.globalCompositeOperation = 'destination-out';
      const pg = LX.createRadialGradient(player.x + player.w / 2, player.y + player.h / 2, 0, player.x + player.w / 2, player.y + player.h / 2, 70); pg.addColorStop(0, 'rgba(0,0,0,0.3)'); pg.addColorStop(1, 'rgba(0,0,0,0)'); LX.fillStyle = pg; LX.fillRect(player.x - 70, player.y - 70, 154, 160);
      for (const l of dynamicLights) { const a = l.life / l.ml * l.int, lg = LX.createRadialGradient(l.x, l.y, 0, l.x, l.y, l.r); lg.addColorStop(0, `rgba(0,0,0,${Math.min(1, a * .6)})`); lg.addColorStop(1, 'rgba(0,0,0,0)'); LX.fillStyle = lg; LX.beginPath(); LX.arc(l.x, l.y, l.r, 0, Math.PI * 2); LX.fill(); }
      LX.globalCompositeOperation = 'source-atop';
      for (const l of dynamicLights) { const a = l.life / l.ml * l.int, [r, g, b] = hexRgb(l.color), cg = LX.createRadialGradient(l.x, l.y, 0, l.x, l.y, l.r * .7); cg.addColorStop(0, `rgba(${r},${g},${b},${Math.min(.3, a * .15)})`); cg.addColorStop(1, 'rgba(0,0,0,0)'); LX.fillStyle = cg; LX.beginPath(); LX.arc(l.x, l.y, l.r * .7, 0, Math.PI * 2); LX.fill(); }
      LX.globalCompositeOperation = 'source-over'; X.drawImage(lightCanvas, 0, 0);
    }

    function drawAimLine() {
      const px = player.x + player.w / 2 + player.facing * 8, py = player.y + 10 + (player.castAnim > 0 ? -8 : 0), s = SPELLS[selSpell];
      X.strokeStyle = s.color; X.lineWidth = 1; X.globalAlpha = .2; X.setLineDash([3, 5]); X.beginPath(); X.moveTo(px, py); X.lineTo(mouse.x, mouse.y); X.stroke(); X.setLineDash([]); X.globalAlpha = 1;
      if (!s.instant && !s.isMeteor && !s.isWind && !s.isSpike && !s.isNova && !s.isWall && !s.isQuake && !s.isFrostNova && !s.isTeleport && !s.isLaser && s.speed > 0) {
        const angle = Math.atan2(mouse.y - py, mouse.x - px); let tx = px, ty = py, tvx = Math.cos(angle) * s.speed, tvy = Math.sin(angle) * s.speed;
        X.fillStyle = s.color; for (let step = 0; step < 50; step++) { tvy += s.grav; tvx *= s.drag; tvy *= s.drag; tx += tvx; ty += tvy; X.globalAlpha = (1 - step / 50) * .25; if (step % 2 === 0) X.fillRect((tx | 0) - 1, (ty | 0) - 1, 2, 2); let hit = false; for (const pl of platforms) { if (tx > pl.x && tx < pl.x + pl.w && ty > pl.y && ty < pl.y + pl.h) { hit = true; break; } } if (hit || tx < 0 || tx > W || ty > H) break; } X.globalAlpha = 1;
      }
      const mx = mouse.x, my = mouse.y; X.strokeStyle = s.color; X.lineWidth = 1; X.globalAlpha = .5;
      X.beginPath(); X.moveTo(mx - 7, my); X.lineTo(mx - 3, my); X.stroke(); X.beginPath(); X.moveTo(mx + 3, my); X.lineTo(mx + 7, my); X.stroke(); X.beginPath(); X.moveTo(mx, my - 7); X.lineTo(mx, my - 3); X.stroke(); X.beginPath(); X.moveTo(mx, my + 3); X.lineTo(mx, my + 7); X.stroke(); X.beginPath(); X.arc(mx, my, 5, 0, Math.PI * 2); X.stroke(); X.globalAlpha = 1;
      if (s.isMeteor || s.isSpike || s.isWall) { X.globalAlpha = .12; X.fillStyle = s.color; X.beginPath(); X.arc(mx, my, (s.exR || s.spikeW || s.wallW || 30) * .5, 0, Math.PI * 2); X.fill(); X.globalAlpha = 1; }
      if (s.isQuake || s.isFrostNova) { X.globalAlpha = .1; X.strokeStyle = s.color; X.lineWidth = 1; X.beginPath(); X.arc(player.x + player.w / 2, player.y + player.h / 2, s.quakeR || s.frostR || 80, 0, Math.PI * 2); X.stroke(); X.globalAlpha = 1; }
    }

    function drawVignette() { const vg = X.createRadialGradient(W / 2, H / 2, W * .25, W / 2, H / 2, W * .7); vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,5,0.4)'); X.fillStyle = vg; X.fillRect(0, 0, W, H); }

    let ambientT = 0;
    function updateAmbient(dt) { ambientT += dt; if (ambientT > 200) { ambientT = 0; for (let i = 0; i < 2; i++)particles.push({ x: Math.random() * W, y: H - 30 + Math.random() * 10, vx: (Math.random() - .5) * .3, vy: -.2 - Math.random() * .4, life: 80 + Math.random() * 50, ml: 130, color: ['#3a2860', '#2a3870', '#4a2050'][(Math.random() * 3) | 0], size: .8 + Math.random(), grav: -.008, type: 'ambient' }); } }

    // ═══ MAIN LOOP ═══
    const keysDown = {}; let lastT = 0;
    function loop(t) {
      const dt = Math.min(t - lastT, 33); lastT = t;
      updatePlayer(keysDown, dt);
      entities.forEach(e => { if (e.active) { physBody(e); e.age += dt; } });
      collideEntities(); updateProjectiles(dt); updateZones(dt);
      updateVFX(dt); updateParticles(); updateLightning(); updateShockwaves(); updateDynLights(); updateDmgNums(); updateAmbient(dt);
      if (screenShake > 0) screenShake *= .88; if (screenShake < .05) screenShake = 0;
      entities = entities.filter(e => e.active || e.age < 5000);

      X.save(); if (screenShake > 0) X.translate((Math.random() - .5) * screenShake * 3, (Math.random() - .5) * screenShake * 3);
      drawBG(); drawPlatforms(); drawDecorations(); drawGravityWells(); drawZones(); drawVFX(); drawParticles(); drawEntities(); drawProjectiles(); drawLightning(); drawShockwaves();
      drawStickman(player, '#4488ff', '#ffcc00', SPELLS[selSpell].color);
      drawAimLine(); drawLighting(); drawDmgNumbers(); drawVignette();
      X.restore();

      document.getElementById('hpBar').style.width = (player.hp / player.maxHp * 100) + '%';
      document.getElementById('mpBar').style.width = (player.mana / player.maxMana * 100) + '%';
      const si = document.getElementById('spellInfo');
      const sp = SPELLS[selSpell]; const cdLeft = Math.max(0, sp.cd - (performance.now() - lastCastPerSpell[selSpell]));
      si.innerHTML = `${sp.icon} <span style="color:${sp.color}">${sp.name}</span> — ${sp.desc} | DMG:${sp.dmg} MANA:${sp.mana} ${cdLeft > 0 ? 'CD:' + Math.ceil(cdLeft / 100) * 100 + 'ms' : 'READY'}`;
      si.style.color = '#888';

      requestAnimationFrame(loop);
    }

    // ═══ INPUT ═══
    const spellKeys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0', 'q', 'e', 't', 'y', 'u', 'i', 'o', 'p', '[', ']', '\\', 'z', 'x'];
    document.addEventListener('keydown', e => {
      keysDown[e.key.toLowerCase()] = true;
      const ki = spellKeys.indexOf(e.key.toLowerCase());
      if (ki >= 0 && ki < SPELLS.length) selectSpell(ki);
      if (e.key.toLowerCase() === 'r') resetWorld();
      if (['1', '2', '3', '4', '5', '6', '7', '8', '9', '0'].includes(e.key) || ['q', 'e', 't', 'y', 'u', 'i', 'o', 'p', '[', ']', '\\', 'z', 'x'].includes(e.key.toLowerCase())) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keysDown[e.key.toLowerCase()] = false; });
    C.addEventListener('mousemove', e => { const rect = C.getBoundingClientRect(); mouse.x = (e.clientX - rect.left) * (W / rect.width); mouse.y = (e.clientY - rect.top) * (H / rect.height); });
    C.addEventListener('mousedown', e => {
      e.preventDefault(); mouse.down = true;
      if (spawnMode) { entities.push(createBody(spawnMode, mouse.x - 10, mouse.y - 10)); return; }
      const ox = player.x + player.w / 2 + player.facing * 10, oy = player.y + 8; fireSpell(selSpell, ox, oy, mouse.x, mouse.y);
    });
    C.addEventListener('mouseup', () => { mouse.down = false; });
    C.addEventListener('contextmenu', e => e.preventDefault());
    setInterval(() => { if (mouse.down && !spawnMode) { const s = SPELLS[selSpell]; if (s.cd <= 200 || s.isLaser) { const ox = player.x + player.w / 2 + player.facing * 10, oy = player.y + 8; fireSpell(selSpell, ox, oy, mouse.x, mouse.y); } } }, 80);

    function selectSpell(idx) {
      selSpell = idx; spawnMode = null;
      document.querySelectorAll('.spell-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
      document.querySelectorAll('[data-spawn]').forEach(b => b.classList.remove('active'));
      SoundFX.playTone(600 + idx * 20, 'square', 0.05, 0.1);
    }

    function resetWorld() {
      SoundFX.playSweep(150, 400, 'sine', 0.3, 0.2);
      vfxSequences = []; entities = []; vfxSequences = []; projectiles = []; particles = []; gravityWells = []; lightningBolts = []; damageNumbers = []; shockwaves = []; dynamicLights = []; poisonClouds = []; fireWalls = []; spikes = []; timeBombs = []; frozenEntities.clear(); player.x = 100; player.y = 300; player.vx = 0; player.vy = 0; player.hp = player.maxHp; player.mana = player.maxMana; lastCastPerSpell.fill(0); spawnInitial();
    }

    function spawnInitial() {
      entities.push(createBody('dummy', 350, 200)); entities.push(createBody('dummy', 500, 340)); entities.push(createBody('dummy', 270, 80)); entities.push(createBody('dummy', 150, 260));
      entities.push(createBody('crate', 400, 310)); entities.push(createBody('crate', 420, 310)); entities.push(createBody('crate', 410, 290));
      entities.push(createBody('barrel', 480, 240)); entities.push(createBody('barrel', 150, 155)); entities.push(createBody('barrel', 600, 345));
      entities.push(createBody('boulder', 320, 180)); entities.push(createBody('boulder', 100, 160));
    }

    // ═══ BUILD TOOLBAR ═══
    const spellRow = document.getElementById('spellRow');
    SPELLS.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'spell-btn tb-btn' + (i === 0 ? ' active' : '');
      btn.innerHTML = `${s.icon}<span class="key-hint">${s.key.toUpperCase()}</span>`;
      btn.title = `${s.name}: ${s.desc}\nDmg:${s.dmg} Mana:${s.mana} CD:${s.cd}ms\nKey: ${s.key.toUpperCase()}`;
      btn.addEventListener('click', () => selectSpell(i));
      spellRow.appendChild(btn);
    });

    document.querySelectorAll('[data-spawn]').forEach(btn => {
      btn.addEventListener('click', () => {
        const t = btn.dataset.spawn;
        if (spawnMode === t) { spawnMode = null; btn.classList.remove('active'); SoundFX.playTone(300, 'triangle', 0.1, 0.1); }
        else { spawnMode = t; document.querySelectorAll('[data-spawn]').forEach(b2 => b2.classList.remove('active')); document.querySelectorAll('.spell-btn').forEach(b2 => b2.classList.remove('active')); btn.classList.add('active'); SoundFX.playTone(400, 'square', 0.1, 0.1); }
      });
    });
    document.getElementById('btnGravUp').addEventListener('click', () => { PHY.gravity = Math.min(1.5, PHY.gravity + .1); document.getElementById('gravLabel').textContent = PHY.gravity.toFixed(2); SoundFX.playTone(400, 'sine', 0.05, 0.1); });
    document.getElementById('btnGravDn').addEventListener('click', () => { PHY.gravity = Math.max(-.5, PHY.gravity - .1); document.getElementById('gravLabel').textContent = PHY.gravity.toFixed(2); SoundFX.playTone(300, 'sine', 0.05, 0.1); });
    document.getElementById('btnClear').addEventListener('click', () => { entities = []; projectiles = []; particles = []; gravityWells = []; lightningBolts = []; damageNumbers = []; shockwaves = []; dynamicLights = []; poisonClouds = []; fireWalls = []; spikes = []; timeBombs = []; frozenEntities.clear(); });
    document.getElementById('btnReset').addEventListener('click', resetWorld);

    spawnInitial(); requestAnimationFrame(loop);
    function resize() { const mW = window.innerWidth - 20, mH = window.innerHeight - 20, s2 = Math.min(mW / W, mH / H, 1.6); C.style.width = (W * s2) + 'px'; C.style.height = (H * s2) + 'px'; }
    resize(); window.addEventListener('resize', resize);
  </script>
</body>

</html>
