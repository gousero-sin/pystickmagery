<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ Arcane Sandbox - Modular Edition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #04040a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      user-select: none
    }

    #wrap {
      position: relative
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #1a1a3a;
      box-shadow: 0 0 80px rgba(60, 30, 160, .3), 0 0 200px rgba(40, 20, 100, .15)
    }

    #toolbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 3px;
      padding: 4px 6px;
      background: rgba(4, 4, 12, .94);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid rgba(60, 40, 120, .4);
      z-index: 10;
      flex-wrap: wrap;
      align-items: center
    }

    .tb-section {
      display: flex;
      gap: 2px;
      align-items: center;
      padding: 0 4px;
      border-right: 1px solid rgba(60, 40, 120, .3)
    }

    #schoolSelect {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      padding: 3px 5px;
      background: rgba(15, 12, 30, .9);
      color: #ccc;
      border: 1px solid rgba(60, 50, 100, .5);
      border-radius: 2px;
      cursor: pointer;
      outline: none;
      transition: all .2s;
      min-width: 80px;
    }

    #schoolSelect:hover,
    #schoolSelect:focus {
      border-color: rgba(120, 80, 220, .6);
      box-shadow: 0 0 8px rgba(80, 50, 180, .3);
    }

    #schoolSelect option {
      background: #0a0a18;
      color: #ccc;
      padding: 4px;
    }

    .school-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 3px;
      box-shadow: 0 0 6px currentColor;
    }

    .tb-section:last-child {
      border: none
    }

    .tb-label {
      font-size: 5px;
      color: #555;
      margin-right: 2px;
      white-space: nowrap
    }

    .tb-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      padding: 3px 5px;
      background: rgba(20, 18, 40, .8);
      color: #999;
      border: 1px solid rgba(60, 50, 100, .4);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      border-radius: 2px
    }

    .tb-btn:hover {
      background: rgba(40, 30, 80, .8);
      color: #ddd;
      border-color: rgba(100, 70, 200, .5);
      box-shadow: 0 0 8px rgba(80, 50, 180, .3)
    }

    .tb-btn.active {
      background: rgba(60, 30, 120, .7);
      color: #fff;
      border-color: rgba(120, 80, 220, .6);
      box-shadow: 0 0 14px rgba(100, 60, 200, .5)
    }

    .spell-btn {
      font-size: 9px;
      padding: 2px 4px;
      min-width: 24px;
      text-align: center;
      position: relative
    }

    .spell-btn .key-hint {
      position: absolute;
      top: -1px;
      right: -1px;
      font-size: 4px;
      color: #666;
      background: rgba(0, 0, 0, .6);
      padding: 0 2px;
      border-radius: 1px;
      line-height: 1.4
    }

    .spell-row {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      max-width: 420px;
    }

    #hud {
      position: absolute;
      bottom: 6px;
      left: 8px;
      display: flex;
      gap: 10px;
      z-index: 10;
      pointer-events: none
    }

    .hud-bar {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .hud-bar label {
      font-size: 5px;
      color: #777
    }

    .bar-bg {
      width: 85px;
      height: 7px;
      background: rgba(0, 0, 0, .6);
      border: 1px solid rgba(80, 60, 120, .3);
      border-radius: 1px;
      overflow: hidden
    }

    .bar-fg {
      height: 100%;
      transition: width .1s
    }

    .hp-fg {
      background: linear-gradient(90deg, #991122, #dd3344);
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, .3)
    }

    .mp-fg {
      background: linear-gradient(90deg, #112299, #3344dd);
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, .3)
    }

    #info {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 5px;
      color: #444;
      z-index: 10;
      pointer-events: none;
      text-align: right;
      line-height: 1.6
    }

    #spellInfo {
      position: absolute;
      bottom: 20px;
      left: 8px;
      font-size: 5px;
      color: #888;
      z-index: 10;
      pointer-events: none
    }

    #gravLabel {
      font-size: 5px;
      color: #666;
      margin: 0 2px
    }

    .cd-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, .6);
      pointer-events: none;
      transition: height 50ms
    }

    /* ═══ MAIN MENU ═══ */
    #mainMenu {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .4s, transform .4s;
    }

    #mainMenu.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05);
    }

    .menu-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #030310 0%, #0a0820 40%, #121244 100%);
    }

    .menu-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(80, 40, 160, .15) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 70%, rgba(40, 80, 160, .1) 0%, transparent 50%);
    }

    .menu-content {
      position: relative;
      text-align: center;
      z-index: 1;
      font-family: 'Press Start 2P', monospace;
    }

    .menu-title {
      font-size: 16px;
      color: #ddd;
      margin-bottom: 6px;
      text-shadow: 0 0 20px rgba(100, 80, 220, .5), 0 2px 4px rgba(0, 0, 0, .5);
      letter-spacing: 2px;
    }

    .menu-sub {
      font-size: 7px;
      color: #666;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .menu-cards {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .menu-card {
      width: 160px;
      padding: 18px 12px;
      background: rgba(15, 12, 30, .85);
      border: 1px solid rgba(60, 50, 100, .4);
      border-radius: 8px;
      cursor: pointer;
      transition: all .25s;
      backdrop-filter: blur(4px);
    }

    .menu-card:hover {
      transform: translateY(-4px) scale(1.03);
      border-color: rgba(120, 80, 220, .6);
      box-shadow: 0 8px 32px rgba(80, 50, 180, .3), 0 0 60px rgba(80, 50, 180, .1);
    }

    .menu-card:active {
      transform: translateY(0) scale(.98);
    }

    .card-icon {
      font-size: 32px;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, .3));
      transition: transform .25s;
    }

    .menu-card:hover .card-icon {
      transform: scale(1.15) rotate(-5deg);
    }

    .menu-card h2 {
      font-size: 9px;
      color: #ccc;
      margin: 0 0 4px;
    }

    .card-desc {
      font-size: 6px;
      color: #8877cc;
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-detail {
      font-size: 5px;
      color: #555;
      margin: 0;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <!-- ═══ MAIN MENU ═══ -->
  <div id="mainMenu">

  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="toolbar">
      <div class="tb-section">

  </div>
  <script type="module">
    import * as REGISTRY from './js/spell-registry.js?v=7';

    // ═══ MODULE BOOTSTRAP ═══


    const C = document.getElementById('c'), X = C.getContext('2d');

    const lightCanvas = document.createElement('canvas'); lightCanvas.width = W; lightCanvas.height = H; const LX = lightCanvas.getContext('2d');

    const PHY = { gravity: .42, airDrag: .998, groundFric: .85, restitution: .35, maxVel: 18 };

    // ═══ AUDIO SYSTEM ═══
    // SoundFX imported from js/core/sounds.js via registry bootstrap

    const SPELLS = [

    // Attach registry hooks to spells for O(1) runtime lookup
    REGISTRY.attachHooksToSpells(SPELLS);

    let selSpell = 0, spawnMode = null, lastCast = 0, lastCastPerSpell = SPELLS.map(s => -s.cd);

    // ═══ SCENE DEFINITIONS ═══
    const SCENES = [
      { // Scene 0: Arcane Tower
        name: 'Arcane Tower',
        platforms: [
          { x: 0, y: H - 24, w: W, h: 24, ground: true },
          { x: 55, y: 385, w: 150, h: 14 }, { x: 350, y: 345, w: 130, h: 14 }, { x: 575, y: 375, w: 170, h: 14 },
          { x: 175, y: 285, w: 110, h: 14 }, { x: 455, y: 275, w: 140, h: 14 },
          { x: 295, y: 215, w: 160, h: 14 }, { x: 75, y: 185, w: 100, h: 14 }, { x: 595, y: 195, w: 110, h: 14 },
          { x: 345, y: 135, w: 130, h: 14 }, { x: 145, y: 105, w: 90, h: 14 }, { x: 525, y: 115, w: 100, h: 14 },
        ],
        spawns: [
          ['dummy', 350, 200], ['dummy', 500, 340], ['dummy', 270, 80], ['dummy', 150, 260],
          ['crate', 400, 310], ['crate', 420, 310], ['crate', 410, 290],
          ['barrel', 480, 240], ['barrel', 150, 155], ['barrel', 600, 345],
          ['boulder', 320, 180], ['boulder', 100, 160]
        ],
        hasCrystals: true, hasVines: true, hasFireflies: false,
      },
      { // Scene 1: Dark Forest
        name: 'Dark Forest',
        platforms: [
          { x: 0, y: H - 24, w: W, h: 24, ground: true },
          { x: 40, y: 400, w: 120, h: 16 }, { x: 280, y: 380, w: 160, h: 16 }, { x: 560, y: 395, w: 140, h: 16 },
          { x: 130, y: 320, w: 100, h: 14 }, { x: 420, y: 310, w: 130, h: 14 },
          { x: 60, y: 245, w: 130, h: 14 }, { x: 310, y: 240, w: 110, h: 14 }, { x: 570, y: 260, w: 120, h: 14 },

          { x: 350, y: 110, w: 120, h: 14 }, { x: 100, y: 100, w: 80, h: 14 }, { x: 620, y: 120, w: 90, h: 14 },
        ],
        spawns: [
          ['dummy', 320, 350], ['dummy', 500, 250], ['dummy', 200, 150], ['dummy', 400, 100],
          ['crate', 310, 220], ['crate', 330, 220],
          ['barrel', 130, 300], ['barrel', 580, 240],
          ['boulder', 460, 155], ['boulder', 70, 220]
        ],
        hasCrystals: false, hasVines: true, hasFireflies: true,
      },
    ];

    let currentScene = 0;
    let basePlatformCount = 0;
    let platforms = [], torches = [], crystals = [], vines = [], fireflies = [];

    function loadScene(idx) {
      currentScene = idx;
      const sc = SCENES[idx];
      platforms.length = 0;
      torches.length = 0; crystals.length = 0; vines.length = 0; fireflies.length = 0;

      sc.platforms.forEach(p => platforms.push({ ...p }));
      state.platforms = platforms;
      basePlatformCount = platforms.length;

      for (let i = 1; i < platforms.length; i++) {
        const p = platforms[i];
        if (Math.random() > .4) torches.push({ x: p.x + 5, y: p.y - 10, fl: Math.random() * 100 });
        if (Math.random() > .4) torches.push({ x: p.x + p.w - 8, y: p.y - 10, fl: Math.random() * 100 });
        if (sc.hasCrystals && Math.random() > .6) crystals.push({ x: p.x + p.w * Math.random(), y: p.y - 6, h: 4 + Math.random() * 6, color: ['#6644cc', '#4488ff', '#44ccaa', '#cc44aa'][Math.floor(Math.random() * 4)] });

      }

        for (let i = 0; i < 40; i++) {
          fireflies.push({
            x: Math.random() * W, y: Math.random() * (H - 80),
            sx: Math.random() * W, sy: Math.random() * (H - 80),
            phase: Math.random() * Math.PI * 2,
            speed: 0.3 + Math.random() * 0.5,
            brightness: Math.random(),
          });
        }
      }
    }

    loadScene(0);

    let { entities, projectiles, particles, gravityWells, lightningBolts, damageNumbers, shockwaves, dynamicLights, vfxSequences, poisonClouds, fireWalls, spikes, timeBombs, frozenEntities } = state;
    let screenShake = 0;

    const player = { x: 100, y: 300, vx: 0, vy: 0, w: 14, h: 30, hp: 100, maxHp: 100, mana: 100, maxMana: 100, onGround: false, facing: 1, animT: 0, frame: 0, castAnim: 0, castType: 'thrust', jumpCount: 0, maxJumps: 2, hatWave: 0, capeWave: 0, staffGlow: 0, lean: 0, sq: 1, st: 1, inv: false };

    state.spells = SPELLS;
    state.manifestConstructs = state.manifestConstructs || [];
    state.manifestDraft = null;
    state.refundSpellCast = (spellIdx, manaRefund = 0) => {
      player.mana = Math.min(player.maxMana, player.mana + manaRefund);
      lastCastPerSpell[spellIdx] = -SPELLS[spellIdx].cd;
    };
    let mouse = { x: W / 2, y: H / 2, down: false };

    // ═══ ENTITY ═══
    function createBody(type, x, y) {
      const base = { x, y, vx: 0, vy: 0, onGround: false, active: true, age: 0 };
      switch (type) {
        case 'dummy': return { ...base, type: 'dummy', w: 14, h: 30, mass: 1.2, hp: 80, maxHp: 80, rest: .2, fric: .88, hitF: 0 };
        case 'crate': return { ...base, type: 'crate', w: 20, h: 20, mass: 1.5, hp: 40, maxHp: 40, rest: .3, fric: .82, hitF: 0, rot: 0, rotV: 0 };
        case 'barrel': return { ...base, type: 'barrel', w: 16, h: 22, mass: 2, hp: 50, maxHp: 50, rest: .25, fric: .8, hitF: 0, rot: 0, rotV: 0, explosive: true };
        case 'boulder': return { ...base, type: 'boulder', w: 24, h: 22, mass: 4, hp: 120, maxHp: 120, rest: .5, fric: .9, hitF: 0, rot: 0, rotV: 0 };
      }
    }

    // ═══ PHYSICS ═══
    function physBody(b) {
      if (!b.active) return;
      // Frozen check
      const frozen = frozenEntities.get(b);
      if (frozen && frozen > 0) { b.vx *= .9; b.vy *= .9; if (b.rotV !== undefined) b.rotV *= .8; }
      for (const gw of gravityWells) { const dx = gw.x - (b.x + b.w / 2), dy = gw.y - (b.y + b.h / 2), dist = Math.hypot(dx, dy); if (dist < gw.r && dist > 5) { const f = gw.str * (1 - dist / gw.r) / (b.mass || 1); b.vx += (dx / dist) * f; b.vy += (dy / dist) * f; } }
      b.vy += PHY.gravity; b.vx *= PHY.airDrag; b.vy *= PHY.airDrag;
      b.vx = Math.max(-PHY.maxVel, Math.min(PHY.maxVel, b.vx)); b.vy = Math.max(-PHY.maxVel, Math.min(PHY.maxVel, b.vy));
      b.x += b.vx; b.y += b.vy;
      if (b.rot !== undefined) { b.rot += (b.rotV || 0); b.rotV = (b.rotV || 0) * .96; }
      b.onGround = false;
      for (const p of platforms) {
        if (!isSolidManifestPlatform(p)) continue;
        if (b.x + b.w > p.x && b.x < p.x + p.w) {
          if (b.vy >= 0 && b.y + b.h > p.y && b.y + b.h < p.y + p.h + Math.abs(b.vy) + 2) {
            b.y = p.y - b.h; const r = b.rest ?? PHY.restitution;
            if (Math.abs(b.vy) > 1.5) { b.vy = -b.vy * r; if (b.rotV !== undefined) b.rotV += b.vx * .05; if (Math.abs(b.vy) > 3) spawnP(b.x + b.w / 2, b.y + b.h, '#665544', 3, 'dust'); } else b.vy = 0;
            b.onGround = true; b.vx *= (b.fric || PHY.groundFric);
          }
          else if (b.vy < 0 && b.y < p.y + p.h && b.y > p.y - 2 && !p.ground) { b.y = p.y + p.h; b.vy = Math.abs(b.vy) * .2; }
        }
        if (b.y + b.h > p.y + 4 && b.y < p.y + p.h - 2) {

      }
      if (b.x < 0) { b.x = 0; b.vx = Math.abs(b.vx) * .3; } if (b.x + b.w > W) { b.x = W - b.w; b.vx = -Math.abs(b.vx) * .3; }
      if (b.y < -200) { b.y = -200; b.vy = Math.abs(b.vy) * .3; } if (b.y > H + 100) b.active = false;
    }

    function collideEntities() {
      for (let i = 0; i < entities.length; i++) {
        const a = entities[i]; if (!a.active) continue;
        for (let j = i + 1; j < entities.length; j++) {
          const b = entities[j]; if (!b.active) continue;
          if (a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y) {

          }
        }
      }

    // ═══ ENEMY AI ═══
    function initAI(e) {
      e.ai = {
        state: 'idle',       // idle, patrol, dodge, flee, jump
        timer: 0,            // general purpose timer
        patrolDir: Math.random() > 0.5 ? 1 : -1,
        dodgeDir: 0,
        jumpCd: 0,           // jump cooldown
        thinkCd: 0,          // decision cooldown
        platform: null,      // current platform reference
        targetPlat: null,    // platform to jump to
        awareness: 180 + Math.random() * 120, // detection range
        reactSpeed: 0.6 + Math.random() * 0.4, // how fast they react
        facing: 1,
      };
    }

    function findPlatformUnder(x, y, w, h) {
      let best = null, bestY = Infinity;
      for (const p of platforms) {
        if (x + w > p.x && x < p.x + p.w && p.y >= y + h - 4 && p.y < bestY) {
          bestY = p.y; best = p;
        }
      }
      return best;
    }

    function updateEnemyAI(dt) {
      for (const e of entities) {
        if (!e.active || e.type !== 'dummy') continue;
        const frozen = frozenEntities.get(e);
        if (frozen && frozen > 0) continue; // skip if frozen

        // Initialize AI on first update
        if (!e.ai) initAI(e);
        const ai = e.ai;
        ai.timer += dt;
        if (ai.jumpCd > 0) ai.jumpCd -= dt;
        if (ai.thinkCd > 0) ai.thinkCd -= dt;

        const ex = e.x + e.w / 2, ey = e.y + e.h / 2;
        const px = player.x + player.w / 2, py = player.y + player.h / 2;
        const distToPlayer = Math.hypot(ex - px, ey - py);

        // Update current platform
        ai.platform = findPlatformUnder(e.x, e.y, e.w, e.h);

        // ── THREAT DETECTION: dodge incoming projectiles ──
        let threat = null, threatDist = 120;
        for (const p of projectiles) {
          const dx = p.x - ex, dy = p.y - ey;
          const dist = Math.hypot(dx, dy);
          if (dist > threatDist) continue;
          // Check if projectile is heading towards us
          const dot = (p.vx * -dx + p.vy * -dy);
          if (dot > 0 && dist < threatDist) {
            threatDist = dist; threat = p;
          }
        }

        // Also detect spikes, vfx dangers
        for (const sk of spikes) {
          const skCx = sk.x + sk.w / 2;
          const dist = Math.abs(ex - skCx);
          if (dist < sk.w + 20 && Math.abs(ey - sk.y) < sk.maxH + 30) {
            if (dist < threatDist) { threatDist = dist; threat = { x: skCx, y: sk.y, vx: 0, vy: 0 }; }
          }
        }

        // ── STATE MACHINE ──
        if (ai.thinkCd <= 0) {
          ai.thinkCd = 5 + Math.random() * 8; // think every ~5-13 frames

          // Priority 1: DODGE threats
          if (threat) {
            ai.state = 'dodge';
            const tdx = threat.x - ex;
            ai.dodgeDir = tdx > 0 ? -1 : 1; // dodge away from threat
            // If threat is above, try to move sideways; if directly ahead, jump
            if (Math.abs(threat.y - ey) < 20 && Math.abs(tdx) < 40) {
              ai.state = 'jump'; // jump over it
            }
          }
          // Priority 2: FLEE if player is nearby
          else if (distToPlayer < ai.awareness) {
            ai.state = 'flee';
            ai.facing = px > ex ? -1 : 1; // face away from player
          }
          // Priority 3: occasionally jump to a different platform
          else if (ai.jumpCd <= 0 && e.onGround && Math.random() < 0.02) {
            ai.state = 'jump';
            ai.jumpCd = 120 + Math.random() * 180; // cooldown 2-5 seconds
            // Find a nearby platform to jump to
            const curPlat = ai.platform;
            let candidates = [];
            for (const p of platforms) {
              if (p === curPlat || p.ground) continue;
              const pdx = (p.x + p.w / 2) - ex;
              const pdy = p.y - (e.y + e.h);
              if (Math.abs(pdx) < 200 && pdy > -180 && pdy < 60) {
                candidates.push({ plat: p, dx: pdx, dy: pdy });
              }
            }
            if (candidates.length > 0) {
              ai.targetPlat = candidates[Math.floor(Math.random() * candidates.length)];
            } else {
              ai.state = 'patrol'; // no good platform, just patrol
            }
          }
          // Default: PATROL
          else if (ai.state === 'idle' || (ai.state !== 'dodge' && ai.state !== 'jump')) {
            ai.state = 'patrol';
            // Reverse direction at platform edges or randomly
            if (ai.platform) {
              if (e.x <= ai.platform.x + 5) ai.patrolDir = 1;
              else if (e.x + e.w >= ai.platform.x + ai.platform.w - 5) ai.patrolDir = -1;
              else if (Math.random() < 0.008) ai.patrolDir *= -1;
            }
          }
        }

        // ── EXECUTE STATE ──
        const speed = ai.reactSpeed;

        if (ai.state === 'dodge') {
          // Quick lateral dodge
          e.vx += ai.dodgeDir * speed * 2.5;
          e.vx = Math.max(-6, Math.min(6, e.vx));
          ai.facing = ai.dodgeDir;
          // Jump if on ground and threat is close
          if (e.onGround && threatDist < 60 && ai.jumpCd <= 0) {
            e.vy = -8 - Math.random() * 3;
            ai.jumpCd = 30;
          }
          if (ai.timer > 30 || !threat) { ai.state = 'idle'; ai.timer = 0; }
        }
        else if (ai.state === 'flee') {
          // Run AWAY from player
          const dir = px > ex ? -1 : 1; // opposite direction
          e.vx += dir * speed * 1.2;
          e.vx = Math.max(-4.5, Math.min(4.5, e.vx));
          ai.facing = dir;
          // Jump away if player is close and above
          if (e.onGround && py < ey - 20 && ai.jumpCd <= 0 && Math.abs(px - ex) < 80) {
            e.vy = -9 - Math.random() * 2;
            e.vx += dir * 3;
            ai.jumpCd = 40;
          }
          // Jump off platform edge to escape
          if (e.onGround && ai.platform) {
            const edgeDist = dir > 0 ? (ai.platform.x + ai.platform.w - e.x - e.w) : (e.x - ai.platform.x);
            if (edgeDist < 8 && ai.jumpCd <= 0) {
              e.vy = -8;
              e.vx += dir * 3;
              ai.jumpCd = 50;
            }
          }
          if (distToPlayer > ai.awareness * 1.5) { ai.state = 'patrol'; ai.timer = 0; }
        }
        else if (ai.state === 'jump') {
          if (e.onGround && ai.targetPlat) {
            const tp = ai.targetPlat;
            const jumpDir = tp.dx > 0 ? 1 : -1;
            const jumpH = Math.min(12, 7 + Math.abs(tp.dy) * 0.04);
            e.vy = -jumpH;
            e.vx = jumpDir * (2.5 + Math.abs(tp.dx) * 0.015);
            ai.facing = jumpDir;
            ai.targetPlat = null;
            ai.state = 'idle';
            ai.timer = 0;
          } else if (e.onGround && !ai.targetPlat) {
            // Simple dodge jump
            e.vy = -9;
            e.vx += (ai.dodgeDir || ai.patrolDir) * 2;
            ai.state = 'idle';
            ai.timer = 0;
          }
          if (ai.timer > 40) { ai.state = 'idle'; ai.timer = 0; }
        }
        else if (ai.state === 'patrol') {
          e.vx += ai.patrolDir * speed * 0.3;
          e.vx = Math.max(-1.8, Math.min(1.8, e.vx));
          ai.facing = ai.patrolDir;
          // Random idle pause
          if (Math.random() < 0.003) { ai.state = 'idle'; ai.timer = 0; }
        }
        else if (ai.state === 'idle') {
          e.vx *= 0.9; // slow down
          if (ai.timer > 30 + Math.random() * 60) { ai.state = 'patrol'; ai.timer = 0; }
        }

        // Clamp on screen
        if (e.x < 2) { e.x = 2; ai.patrolDir = 1; }
        if (e.x + e.w > W - 2) { e.x = W - e.w - 2; ai.patrolDir = -1; }
      }
    }

      });
    });
    document.getElementById('btnGravUp').addEventListener('click', () => { PHY.gravity = Math.min(1.5, PHY.gravity + .1); document.getElementById('gravLabel').textContent = PHY.gravity.toFixed(2); SoundFX.playTone(400, 'sine', 0.05, 0.1); });
    document.getElementById('btnGravDn').addEventListener('click', () => { PHY.gravity = Math.max(-.5, PHY.gravity - .1); document.getElementById('gravLabel').textContent = PHY.gravity.toFixed(2); SoundFX.playTone(300, 'sine', 0.05, 0.1); });
    document.getElementById('btnClear').addEventListener('click', () => { clearManifestConstructs(); entities.length = 0; projectiles.length = 0; particles.length = 0; gravityWells.length = 0; lightningBolts.length = 0; damageNumbers.length = 0; shockwaves.length = 0; dynamicLights.length = 0; poisonClouds.length = 0; fireWalls.length = 0; spikes.length = 0; timeBombs.length = 0; frozenEntities.clear(); vfxSequences.length = 0; });
    document.getElementById('btnReset').addEventListener('click', resetWorld);
    document.getElementById('btnMenu').addEventListener('click', () => {
      document.getElementById('mainMenu').classList.remove('hidden');
    });

    // ═══ MAIN MENU HANDLERS ═══
    let gameStarted = false;
    document.querySelectorAll('.menu-card').forEach(card => {
      card.addEventListener('click', () => {
        const sceneIdx = parseInt(card.dataset.scene);
        loadScene(sceneIdx);
        currentScene = sceneIdx;
        resetWorld();
        document.getElementById('mainMenu').classList.add('hidden');
        if (!gameStarted) {
          gameStarted = true;
          requestAnimationFrame(loop);
        }
        SoundFX.playSweep(200, 800, 'sine', 0.2, 0.2);
      });
    });

    spawnInitial();
    function resize() { const mW = window.innerWidth - 20, mH = window.innerHeight - 20, s2 = Math.min(mW / W, mH / H, 1.6); C.style.width = (W * s2) + 'px'; C.style.height = (H * s2) + 'px'; }
    resize(); window.addEventListener('resize', resize);

  </script>
</body>

</html>
